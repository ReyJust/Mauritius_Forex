name: Get Forex

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 2-14/2 * * 1-5" # Forex is only during buisness days.

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python script
        run: python main.py

      - name: Push changes
        run: |-
          git config user.name "Forex Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A

          # Check if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit. Exiting."
            exit 0
          fi

          timestamp=$(date -u)
          git commit -m "${timestamp} Forex" || exit 0
          git push

      - name: Create issue if scraper degraded
        if: hashFiles('unknown_banks.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const banks = JSON.parse(fs.readFileSync('unknown_banks.json', 'utf8'));

            if (!banks.length) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Forex scraper: unknown bank images detected',
              body: [
                'The forex scraper detected unknown bank image names:',
                '',
                '```',
                ...banks,
                '```',
                '',
                'The run succeeded but mappings likely need updating.'
              ].join('\n')
            });